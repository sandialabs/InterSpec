apply plugin: 'com.android.application'

// Reads a build property from environment variable first, then local.properties fallback.
// Returns null if neither source provides the value.
def signing_prop(String envName, String propKey) {
    def val = System.getenv(envName)
    if( val != null && !val.isEmpty() )
        return val

    try {
        Properties properties = new Properties()
        def localPropsFile = project.rootProject.file('local.properties')
        if( localPropsFile.exists() ) {
            properties.load(localPropsFile.newDataInputStream())
            val = properties.getProperty(propKey, null)
        }
    } catch( Exception e ) {
        // local.properties missing or unreadable — not an error
    }

    return val
}

def keystore_file     = signing_prop("KEYSTORE_LOCATION", "keystore.location")
def keystore_pword    = signing_prop("KEYSTORE_PASSWORD", "keystore.password")
def keystore_alias    = signing_prop("KEYSTORE_ALIAS_NAME", "keystore.alias.name")
def keystore_alias_pw = signing_prop("KEYSTORE_ALIAS_PASSWORD", "keystore.alias.password")

def hasSigningConfig = (keystore_file != null && keystore_pword != null
                        && keystore_alias != null && keystore_alias_pw != null)

def leafletKey = signing_prop("LEAFLET_MAPS_KEY", "leaflet.maps.key")
if( leafletKey == null || leafletKey.isEmpty() ) {
    logger.warn("WARNING: LEAFLET_MAPS_KEY not set. Leaflet maps will not work at runtime. " +
                "Set the LEAFLET_MAPS_KEY environment variable or add leaflet.maps.key to local.properties.")
}


android {
    if( hasSigningConfig ) {
        signingConfigs {
            config {
                keyAlias keystore_alias
                keyPassword keystore_alias_pw
                storeFile file(keystore_file)
                storePassword keystore_pword
            }
        }
    }

    compileSdkVersion 35
    ndkVersion '28.0.13004108'

    defaultConfig {
        applicationId "gov.sandia.interspec"
        minSdkVersion 21
        targetSdkVersion 35
        versionCode 18
        versionName "1.0.13"

        if( hasSigningConfig ) {
            signingConfig signingConfigs.config
        }

        externalNativeBuild {
            cmake {
                arguments "-DUSE_LEAFLET_MAP=ON",
                          "-DLEAFLET_MAPS_KEY=${leafletKey}",
                          "-DANDROID_ARM_NEON=TRUE"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
        }
    }

    externalNativeBuild {
        cmake {
            path "../../CMakeLists.txt"
        }
    }

    flavorDimensions 'cpuArch'
    productFlavors {
        arm8 {
            dimension 'cpuArch'
            ndk {
                abiFilters 'arm64-v8a'
            }
        }
        universal {
            dimension 'cpuArch'
            ndk {
                abiFilters 'arm64-v8a', 'x86_64'
            }
        }
    }
    namespace 'gov.sandia.InterSpec'
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation 'androidx.appcompat:appcompat:1.4.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.3'
}

task makeAssets(type:Exec) {
    workingDir '../'

    //on linux
    commandLine './make_assets.sh'

    // Skip if assets zip already exists (e.g., pre-built in Docker)
    onlyIf {
        !file('../InterSpec/app/src/main/assets/interspec-assets.zip').exists()
    }
}

preBuild.dependsOn makeAssets

gradle.projectsEvaluated {
    assembleRelease.dependsOn makeAssets
    assembleDebug.dependsOn makeAssets
}
